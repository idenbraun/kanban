    <style>
        :root {
            --bg: #0a0e1a;
            --bg-gradient: radial-gradient(ellipse at 50% 30%, #141b2d 0%, #0a0e1a 70%);
            --bg-secondary: rgba(255,255,255,0.04);
            --bg-card: rgba(255,255,255,0.06);
            --bg-hover: rgba(255,255,255,0.08);
            --bg-input: rgba(255,255,255,0.06);
            --text-primary: #e8e8e8;
            --text-secondary: #a0a0a0;
            --text-muted: #5a5a5a;
            --border-color: rgba(255,255,255,0.06);
            --shadow: 0 4px 24px rgba(0,0,0,0.4);
            --shadow-hover: 0 6px 32px rgba(0,0,0,0.6);
            --btn-primary: #4a6cf7;
            --btn-primary-hover: #6a8cff;
            --btn-danger: #d32f2f;
            --btn-danger-hover: #f44336;
            --tag-bg: rgba(255,255,255,0.08);
            --tag-text: #ccc;
            --modal-bg: #141b2d;
            --overlay: rgba(0,0,0,0.7);
            --fab-shadow: 0 4px 24px rgba(74,108,247,0.3);
            --fab-bg: #4a6cf7;
            --fab-color: #fff;
            --safe-area-bottom: env(safe-area-inset-bottom, 0px);
            --col-todo: #f9a825;
            --col-progress: #4a6cf7;
            --col-done: #34c759;
            --col-archive: #6a6a6a;
            --border-radius: 16px;
            --transition: 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
            --footer-text: #3a3a3a;
            --footer-link: #6a6a6a;
            --footer-link-hover: #c0c0c0;
            --footer-border: #181818;
            --header-bg: rgba(10, 14, 26, 0.6);
            --sidebar-bg: #0a0e1a;
            --select-option-bg: #141b2d;
            --select-option-hover: rgba(255,255,255,0.08);
            --deadline-urgent: #ff4444;
            --deadline-today: #ffa502;
            --deadline-future: #4a6cf7;
            --calendar-bg: rgba(255,255,255,0.03);
            --calendar-hover: rgba(255,255,255,0.06);
            --calendar-selected: rgba(74,108,247,0.3);
            --calendar-weekend: rgba(255,255,255,0.02);
            --notification-bg: rgba(10, 14, 26, 0.95);
            --notification-success: #34c759;
            --notification-warning: #ffa502;
            --notification-danger: #ff4444;
            --notification-info: #4a6cf7;
        }

        html[data-bg="dark"] {
            --bg: #0a0a0a;
            --bg-secondary: rgba(255,255,255,0.02);
            --bg-card: rgba(255,255,255,0.03);
            --bg-hover: rgba(255,255,255,0.05);
            --bg-input: rgba(255,255,255,0.03);
            --border-color: rgba(255,255,255,0.03);
            --text-secondary: #888;
            --text-muted: #444;
            --modal-bg: #111;
            --overlay: rgba(0,0,0,0.85);
            --shadow: 0 4px 24px rgba(0,0,0,0.8);
            --shadow-hover: 0 6px 32px rgba(0,0,0,0.9);
            --header-bg: rgba(10, 10, 10, 0.8);
            --sidebar-bg: #0a0a0a;
            --footer-text: #2a2a2a;
            --footer-link: #555;
            --footer-link-hover: #aaa;
            --footer-border: #111;
            --select-option-bg: #1a1a1a;
            --select-option-hover: rgba(255,255,255,0.05);
            --calendar-bg: rgba(255,255,255,0.02);
            --calendar-hover: rgba(255,255,255,0.04);
            --calendar-selected: rgba(74,108,247,0.2);
            --calendar-weekend: rgba(255,255,255,0.01);
            --notification-bg: rgba(10, 10, 10, 0.95);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            min-height: 100vh;
            min-height: 100dvh;
            margin: 0;
            padding: 0;
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            transition: background 0.3s, color 0.3s;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            display: flex;
            flex-direction: column;
            background-attachment: fixed;
        }

        html {
            background: #0a0e1a;
            background-attachment: fixed;
            background-size: 100% 100%;
            background-repeat: no-repeat;
            background-position: center center;
        }

        .app-wrapper {
            display: flex;
            flex-direction: column;
            flex: 1 0 auto;
            width: 100%;
            max-width: 100%;
            min-height: 100vh;
            min-height: 100dvh;
            background: transparent;
        }

        /* ========== УВЕДОМЛЕНИЯ ========== */
        .notification-container {
            position: fixed;
            top: 80px;
            right: 20px;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-width: 380px;
            width: 100%;
            pointer-events: none;
        }

        .notification {
            background: var(--notification-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 14px 18px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            display: flex;
            align-items: flex-start;
            gap: 12px;
            animation: slideIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            pointer-events: all;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .notification::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
        }

        .notification.success::before { background: var(--notification-success); }
        .notification.warning::before { background: var(--notification-warning); }
        .notification.danger::before { background: var(--notification-danger); }
        .notification.info::before { background: var(--notification-info); }

        .notification:hover {
            transform: translateX(-4px);
        }

        .notification.hiding {
            animation: slideOut 0.3s ease forwards;
        }

        .notification-icon {
            font-size: 20px;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .notification-content {
            flex: 1;
        }

        .notification-title {
            font-weight: 600;
            font-size: 14px;
            color: var(--text-primary);
            margin-bottom: 2px;
        }

        .notification-text {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.4;
        }

        .notification-time {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        @keyframes slideIn {
            from {
                transform: translateX(120%) scale(0.9);
                opacity: 0;
            }
            to {
                transform: translateX(0) scale(1);
                opacity: 1;
            }
        }

        @keyframes slideOut {
            from {
                transform: translateX(0) scale(1);
                opacity: 1;
            }
            to {
                transform: translateX(120%) scale(0.9);
                opacity: 0;
            }
        }

        /* ========== ХЕДЕР ========== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            padding-top: max(12px, env(safe-area-inset-top, 0px));
            background: var(--header-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
            min-height: 56px;
            transition: background 0.3s;
            gap: 8px;
            z-index: 10;
            flex-wrap: wrap;
            position: sticky;
            top: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
            position: relative;
            flex: 1 1 auto;
        }

        @media (max-width: 767px) {
            .header-left {
                flex-direction: column;
                align-items: flex-start;
                gap: 0;
            }
            .save-status {
                padding-left: 10px;
                margin-top: -2px;
            }
        }

        .board-selector {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            padding: 4px 10px;
            border-radius: 8px;
            transition: background 0.15s;
            user-select: none;
        }

        .board-selector:hover {
            background: var(--bg-hover);
        }

        .board-selector h1 {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .board-selector h1 i {
            color: var(--btn-primary);
        }

        .board-selector .arrow {
            font-size: 12px;
            color: var(--text-muted);
            transition: transform 0.25s;
        }

        .board-selector .arrow.open {
            transform: rotate(180deg);
        }

        .save-status {
            font-size: 12px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: default;
            position: relative;
            transition: color 0.3s;
        }

        .save-status .status-icon {
            font-size: 14px;
            transition: transform 0.3s;
        }

        .save-status .status-text {
            font-size: 11px;
            letter-spacing: 0.04em;
        }

        .save-status.saving { color: #ffa726; }
        .save-status.saved { color: #81c784; }

        .tooltip {
            position: absolute;
            top: calc(100% + 8px);
            left: 50%;
            transform: translateX(-50%) scale(0.9);
            background: var(--modal-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 6px 12px;
            font-size: 11px;
            color: var(--text-secondary);
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: all 0.2s ease;
            font-weight: 400;
            letter-spacing: 0.02em;
            z-index: 20;
        }

        .tooltip::after {
            content: '';
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            border: 4px solid transparent;
            border-bottom-color: var(--modal-bg);
        }

        .save-status:hover .tooltip {
            opacity: 1;
            transform: translateX(-50%) scale(1);
        }

        .header-actions {
            display: flex;
            gap: 4px;
            align-items: center;
            position: relative;
            z-index: 5;
            flex-shrink: 0;
            flex-wrap: wrap;
        }

        .header-actions button {
            padding: 8px 12px;
            border: none;
            border-radius: 8px;
            background: transparent;
            color: var(--text-secondary);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            min-height: 40px;
            min-width: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-weight: 500;
            letter-spacing: 0.03em;
            position: relative;
            z-index: 5;
        }

        .header-actions button:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .header-actions button .label {
            font-size: 13px;
            display: none;
        }

        .header-actions button .badge-archive {
            background: var(--col-archive);
            color: #fff;
            font-size: 10px;
            border-radius: 20px;
            padding: 0 8px;
            min-width: 20px;
            height: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .header-actions .export-dropdown {
            position: relative;
        }

        .header-actions .export-dropdown .dropdown-menu {
            position: absolute;
            top: calc(100% + 4px);
            right: 0;
            background: var(--modal-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 4px;
            min-width: 160px;
            display: none;
            z-index: 30;
            backdrop-filter: blur(12px);
        }

        .header-actions .export-dropdown .dropdown-menu.open {
            display: block;
        }

        .header-actions .export-dropdown .dropdown-menu button {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 14px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-size: 13px;
            cursor: pointer;
            width: 100%;
            border-radius: 6px;
            transition: background 0.15s;
            min-height: 36px;
            justify-content: flex-start;
        }

        .header-actions .export-dropdown .dropdown-menu button:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .board-dropdown {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            min-width: 220px;
            background: var(--modal-bg);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-hover);
            padding: 4px;
            z-index: 30;
            display: none;
            backdrop-filter: blur(12px);
        }

        .board-dropdown.open {
            display: block;
        }

        .board-dropdown .board-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.15s;
            font-size: 14px;
            color: var(--text-secondary);
            gap: 8px;
        }

        .board-dropdown .board-item:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .board-dropdown .board-item.active {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .board-dropdown .board-item .board-name {
            flex: 1;
            cursor: pointer;
            padding: 2px 4px;
            border-radius: 4px;
            transition: background 0.15s;
        }

        .board-dropdown .board-item .board-name:hover {
            background: rgba(255,255,255,0.05);
        }

        .board-dropdown .board-item .board-name.editing {
            background: var(--bg-input);
            border: 1px solid var(--btn-primary);
            outline: none;
            cursor: text;
            padding: 2px 6px;
        }

        .board-dropdown .board-item .delete-board {
            color: var(--text-muted);
            font-size: 12px;
            padding: 2px 6px;
            border-radius: 4px;
            transition: all 0.15s;
            flex-shrink: 0;
        }

        .board-dropdown .board-item .delete-board:hover {
            color: var(--btn-danger);
            background: rgba(211, 47, 47, 0.15);
        }

        .board-dropdown .divider {
            height: 1px;
            background: var(--border-color);
            margin: 4px 0;
        }

        .board-dropdown .create-board {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.15s;
            font-size: 14px;
            color: var(--btn-primary);
        }

        .board-dropdown .create-board:hover {
            background: var(--bg-hover);
        }

        .board-wrapper {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 16px 16px calc(80px + var(--safe-area-bottom));
            -webkit-overflow-scrolling: touch;
        }

        .board-wrapper.dragging-active {
            overflow: hidden !important;
        }

        .board {
            display: flex;
            flex-direction: column;
            gap: 16px;
            max-width: 600px;
            margin: 0 auto;
            padding-bottom: 20px;
        }

        .column {
            background: var(--bg-secondary);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: var(--border-radius);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            transition: background 0.3s, box-shadow 0.3s;
            overflow: hidden;
            border-top: 4px solid var(--col-todo);
        }

        .column[data-column-id="todo"] { border-top-color: var(--col-todo); }
        .column[data-column-id="progress"] { border-top-color: var(--col-progress); }
        .column[data-column-id="done"] { border-top-color: var(--col-done); }
        .column[data-column-id="archive"] { border-top-color: var(--col-archive); opacity: 0.7; }

        .column-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        .column-header h2 {
            font-size: 13px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .column-header h2 .col-icon {
            font-size: 14px;
        }

        .column-header .badge {
            background: var(--tag-bg);
            padding: 1px 10px;
            border-radius: 20px;
            font-size: 11px;
            color: var(--tag-text);
        }

        .column-header .add-card-btn {
            background: none;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 4px 10px;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.15s;
            font-size: 14px;
            min-height: 32px;
            min-width: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .column-header .add-card-btn:active { transform: scale(0.92); }

        .card-list {
            padding: 8px 12px;
            min-height: 60px;
            transition: background 0.15s;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .card-list.drag-over {
            background: var(--bg-hover);
            border-radius: 8px;
        }

        .card-list .empty-message {
            color: var(--text-muted);
            font-size: 12px;
            text-align: center;
            padding: 20px 0;
            letter-spacing: 0.04em;
        }

        .card-wrapper {
            position: relative;
            border-radius: 10px;
            cursor: grab;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            touch-action: pan-y;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), 
                        opacity 0.3s ease,
                        box-shadow 0.3s ease;
        }

        .card-wrapper:active { cursor: grabbing; }

        .card-wrapper.dragging {
            opacity: 0.5;
            transform: scale(0.95);
            transition: opacity 0.2s, transform 0.2s;
        }

        .card-wrapper.drag-overlay {
            position: fixed;
            pointer-events: none;
            z-index: 999;
            opacity: 0.95;
            transform: scale(1.05) rotate(1deg);
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
            border-radius: 10px;
            width: 280px;
            transition: none;
        }

        .card-wrapper.swipe-left {
            animation: swipeLeft 0.3s ease forwards;
        }

        .card-wrapper.swipe-right {
            animation: swipeRight 0.3s ease forwards;
        }

        @keyframes swipeLeft {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(-120%); opacity: 0; }
        }

        @keyframes swipeRight {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(120%); opacity: 0; }
        }

        .card-wrapper.card-enter {
            animation: cardEnter 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes cardEnter {
            from { transform: scale(0.8) translateY(20px); opacity: 0; }
            to { transform: scale(1) translateY(0); opacity: 1; }
        }

        .card-inner {
            position: relative;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 12px 14px;
            transition: transform var(--transition), background 0.3s;
            z-index: 2;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }

        .card-inner:hover {
            background: var(--bg-hover);
        }

        .card-title {
            font-weight: 500;
            font-size: 14px;
            margin-bottom: 2px;
            padding-right: 80px;
            word-break: break-word;
            color: var(--text-primary);
        }

        .card-desc {
            font-size: 12px;
            color: var(--text-secondary);
            margin: 2px 0 6px 0;
            line-height: 1.4;
        }

        .card-tag {
            display: inline-block;
            padding: 1px 10px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 500;
            background: var(--tag-bg);
            color: var(--tag-text);
            letter-spacing: 0.03em;
        }

        .card-tag.red { background: rgba(255, 107, 107, 0.2); color: #ff6b6b; }
        .card-tag.green { background: rgba(52, 199, 89, 0.2); color: #34c759; }
        .card-tag.blue { background: rgba(74, 108, 247, 0.2); color: #4a6cf7; }
        .card-tag.orange { background: rgba(255, 165, 2, 0.2); color: #ffa502; }
        .card-tag.purple { background: rgba(162, 155, 254, 0.2); color: #a29bfe; }

        .card-deadline {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 10px;
            margin-top: 4px;
            background: rgba(255,255,255,0.05);
            color: var(--text-secondary);
        }

        .card-deadline.urgent {
            background: rgba(255, 68, 68, 0.2);
            color: var(--deadline-urgent);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .card-deadline.today {
            background: rgba(255, 165, 2, 0.2);
            color: var(--deadline-today);
        }

        .card-deadline.future {
            background: rgba(74, 108, 247, 0.2);
            color: var(--deadline-future);
        }

        .card-deadline.done {
            background: rgba(52, 199, 89, 0.2);
            color: var(--col-done);
        }

        .auto-archive-badge {
            display: inline-block;
            font-size: 9px;
            padding: 1px 8px;
            border-radius: 10px;
            background: rgba(255, 165, 2, 0.2);
            color: #ffa502;
            margin-top: 4px;
            letter-spacing: 0.04em;
        }

        .card-actions {
            position: absolute;
            top: 8px;
            right: 10px;
            display: flex;
            gap: 2px;
        }

        .card-actions button {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px;
            font-size: 13px;
            min-height: 32px;
            min-width: 32px;
            border-radius: 6px;
            transition: background 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-actions button:active { background: var(--bg-hover); }
        .card-actions .restore-btn:hover { color: var(--col-done); }

        .fab {
            position: fixed;
            bottom: calc(24px + var(--safe-area-bottom));
            right: 20px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: none;
            background: var(--fab-bg);
            color: var(--fab-color);
            font-size: 24px;
            box-shadow: var(--fab-shadow);
            cursor: pointer;
            transition: all 0.25s;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
        }

        .fab:active { transform: scale(0.88); }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--overlay);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            z-index: 999;
            padding: 16px;
        }

        .modal-overlay.active { display: flex; }

        .modal {
            background: var(--modal-bg);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            padding: 24px;
            max-width: 420px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
        }

        .modal h3 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-primary);
        }

        .modal label {
            font-weight: 500;
            font-size: 12px;
            display: block;
            margin: 12px 0 4px 0;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .modal input,
        .modal textarea,
        .modal select {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-size: 15px;
            font-family: inherit;
            background: var(--bg-input);
            color: var(--text-primary);
            transition: border 0.15s;
            min-height: 44px;
            -webkit-appearance: none;
            appearance: none;
        }

        .modal select option {
            background: var(--select-option-bg);
            color: var(--text-primary);
            padding: 8px 12px;
        }

        .modal select option:hover {
            background: var(--select-option-hover);
        }

        .modal select option:checked {
            background: var(--btn-primary);
            color: #fff;
        }

        .modal select:focus {
            outline: none;
            border-color: var(--btn-primary);
        }

        .modal select:-moz-focusring {
            color: var(--text-primary);
            background: var(--bg-input);
        }

        .modal input:focus,
        .modal textarea:focus {
            outline: none;
            border-color: var(--btn-primary);
        }

        .modal textarea { resize: vertical; min-height: 80px; }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            justify-content: flex-end;
        }

        .modal-actions button {
            padding: 10px 24px;
            border: none;
            border-radius: 10px;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.15s;
            min-height: 44px;
        }

        .modal-actions .btn-primary {
            background: var(--btn-primary);
            color: #fff;
        }

        .modal-actions .btn-primary:active { opacity: 0.7; transform: scale(0.97); }

        .modal-actions .btn-secondary {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
        }

        .modal-actions .btn-secondary:active { background: var(--bg-hover); }

        #fileInput { display: none; }

        .sidebar-toggle {
            position: fixed;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 8px;
            height: 48px;
            background: var(--border-color);
            border: none;
            border-radius: 0 4px 4px 0;
            cursor: pointer;
            z-index: 25;
            transition: all 0.3s ease;
            opacity: 0.5;
        }

        .sidebar-toggle:hover {
            opacity: 1;
            width: 10px;
            background: var(--text-secondary);
        }

        .sidebar-toggle.active {
            opacity: 0;
            pointer-events: none;
        }

        .sidebar {
            position: fixed;
            left: -140px;
            top: 0;
            bottom: 0;
            width: 140px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.5rem 0.5rem;
            gap: 1.5rem;
            border-right: 1px solid var(--border-color);
            z-index: 20;
            background: var(--sidebar-bg);
            transition: left 0.35s cubic-bezier(0.4, 0, 0.2, 1), background 0.5s ease;
            overflow: visible;
        }

        .sidebar.open {
            left: 0;
        }

        .sidebar-row {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            width: 100%;
            justify-content: center;
        }

        .sidebar-label {
            font-size: 0.5rem;
            letter-spacing: 0.2em;
            color: var(--text-muted);
            text-transform: uppercase;
            text-align: center;
            margin-bottom: -1.2rem;
            transition: color 0.3s ease;
        }

        .sidebar-dots {
            display: flex;
            gap: 5px;
            opacity: 0.3;
            margin-top: auto;
            margin-bottom: 0.5rem;
        }

        .sidebar-dots span {
            width: 3px;
            height: 3px;
            border-radius: 50%;
            background: var(--text-muted);
        }

        .bg-colors {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 2px;
        }

        .bg-colors .color-option {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .bg-colors .color-option:hover {
            transform: scale(1.1);
        }

        .bg-colors .color-option.active {
            border-color: var(--text-primary);
            box-shadow: 0 0 12px rgba(255,255,255,0.2);
        }

        .bg-colors .color-option[data-bg="blue"] {
            background: #141b2d;
        }

        .bg-colors .color-option[data-bg="dark"] {
            background: #0a0a0a;
        }

        /* ========== КАЛЕНДАРЬ ========== */
        .calendar-btn {
            position: relative;
        }

        .calendar-btn .badge-calendar {
            position: absolute;
            top: -4px;
            right: -4px;
            background: var(--deadline-today);
            color: #fff;
            font-size: 9px;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
        }

        .calendar-modal {
            max-width: 500px;
            max-height: 85vh;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
        }

        .calendar-header h3 {
            margin: 0;
        }

        .calendar-nav {
            display: flex;
            gap: 8px;
        }

        .calendar-nav button {
            background: var(--bg-hover);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 6px 12px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.15s;
            font-size: 14px;
        }

        .calendar-nav button:hover {
            background: var(--bg-card);
            color: var(--text-primary);
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
            margin-bottom: 16px;
        }

        .calendar-weekday {
            text-align: center;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            padding: 8px 0;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.15s;
            font-size: 13px;
            color: var(--text-secondary);
            background: var(--calendar-bg);
            position: relative;
            min-height: 40px;
        }

        .calendar-day:hover {
            background: var(--calendar-hover);
        }

        .calendar-day.today {
            background: var(--calendar-selected);
            color: var(--text-primary);
            font-weight: 600;
        }

        .calendar-day.selected {
            background: var(--btn-primary);
            color: #fff;
        }

        .calendar-day.weekend {
            background: var(--calendar-weekend);
        }

        .calendar-day.other-month {
            opacity: 0.3;
        }

        .calendar-day.has-deadline::after {
            content: '';
            position: absolute;
            bottom: 4px;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--deadline-today);
        }

        .calendar-day.has-deadline.urgent::after {
            background: var(--deadline-urgent);
        }

        .calendar-day .day-number {
            font-size: 13px;
            line-height: 1;
        }

        .calendar-day .day-dot {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            margin-top: 2px;
        }

        .calendar-day .day-dot.urgent { background: var(--deadline-urgent); }
        .calendar-day .day-dot.today { background: var(--deadline-today); }
        .calendar-day .day-dot.future { background: var(--deadline-future); }

        .calendar-events {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border-color);
        }

        .calendar-events h4 {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 12px;
            font-weight: 500;
        }

        .calendar-event {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            background: var(--bg-card);
            border-radius: 8px;
            margin-bottom: 6px;
            transition: background 0.15s;
            cursor: pointer;
        }

        .calendar-event:hover {
            background: var(--bg-hover);
        }

        .calendar-event .event-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .calendar-event .event-dot.urgent { background: var(--deadline-urgent); }
        .calendar-event .event-dot.today { background: var(--deadline-today); }
        .calendar-event .event-dot.future { background: var(--deadline-future); }
        .calendar-event .event-dot.done { background: var(--col-done); }

        .calendar-event .event-info {
            flex: 1;
        }

        .calendar-event .event-title {
            font-size: 13px;
            color: var(--text-primary);
        }

        .calendar-event .event-meta {
            font-size: 11px;
            color: var(--text-muted);
        }

        .calendar-event .event-status {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 10px;
            background: var(--bg-hover);
            color: var(--text-secondary);
        }

        .footer {
            flex-shrink: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.7rem;
            color: var(--footer-text);
            font-size: 0.75rem;
            letter-spacing: 0.15em;
            padding: 1.2rem 1rem 1.2rem;
            background: transparent;
            border-top: 1px solid var(--footer-border);
            transition: color 0.5s ease, border-color 0.5s ease;
            margin-top: auto;
        }

        .footer .links {
            display: flex;
            gap: 2.2rem;
            flex-wrap: nowrap;
            justify-content: center;
            white-space: nowrap;
        }

        .footer a {
            color: var(--footer-link);
            text-decoration: underline;
            text-underline-offset: 3px;
            text-decoration-thickness: 1px;
            text-decoration-color: transparent;
            transition: text-decoration-color 0.25s, color 0.25s;
            font-weight: 400;
            letter-spacing: 0.02em;
        }

        .footer a:hover {
            color: var(--footer-link-hover);
            text-decoration-color: currentColor;
        }

        @media (min-width: 768px) {
            .board-wrapper {
                padding: 20px 24px calc(24px + var(--safe-area-bottom));
            }

            .board {
                flex-direction: row;
                gap: 20px;
                max-width: 1200px;
                align-items: stretch;
            }

            .column { flex: 1; min-height: 400px; }
            .card-list { min-height: 300px; }
            .fab { display: none; }

            .header-actions button .label {
                display: inline;
            }

            .calendar-modal {
                max-width: 600px;
            }

            .notification-container {
                top: 80px;
                right: 24px;
            }
        }

        @media (max-width: 400px) {
            .card-title { font-size: 13px; }
            .card-desc { font-size: 11px; }
            .modal { padding: 18px; }
            .modal input,
            .modal textarea,
            .modal select { font-size: 14px; padding: 10px 12px; }
            .column-header h2 { font-size: 11px; }
            .calendar-day { font-size: 11px; min-height: 32px; }
            .notification-container {
                top: 70px;
                right: 10px;
                left: 10px;
                max-width: 100%;
            }
        }

        @media (max-width: 500px) {
            .header {
                padding: 8px 12px;
                padding-top: max(8px, env(safe-area-inset-top, 0px));
            }
            .header-actions button {
                padding: 6px 8px;
                min-height: 36px;
                min-width: 36px;
                font-size: 13px;
            }
            .header-actions button .badge-archive {
                font-size: 9px;
                min-width: 18px;
                height: 18px;
            }
            .footer .links {
                gap: 1.2rem;
                font-size: 0.7rem;
            }
            .calendar-btn .badge-calendar {
                width: 16px;
                height: 16px;
                font-size: 8px;
                top: -2px;
                right: -2px;
            }
        }

        @media (display-mode: standalone) {
            body {
                padding-top: env(safe-area-inset-top);
            }
        }

        .card-wrapper.dragging .card-inner {
            opacity: 0.3;
            transform: scale(0.95);
        }

        .drag-ghost {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="app-wrapper">
        <!-- ========== КОНТЕЙНЕР УВЕДОМЛЕНИЙ ========== -->
        <div class="notification-container" id="notificationContainer"></div>

        <header class="header">
            <div class="header-left">
                <div class="board-selector" id="boardSelector">
                    <h1><i class="fas fa-tasks"></i> <span id="boardName">Канбан</span></h1>
                    <span class="arrow" id="boardArrow"><i class="fas fa-chevron-down"></i></span>
                </div>
                <span class="save-status saved" id="saveStatus">
                    <i class="fas fa-check-circle status-icon"></i>
                    <span class="status-text">Сохранено</span>
                    <span class="tooltip">Данные сохранены локально в браузере</span>
                </span>
                <div class="board-dropdown" id="boardDropdown">
                    <div id="boardList"></div>
                    <div class="divider"></div>
                    <div class="create-board" id="createBoardBtn">
                        <i class="fas fa-plus"></i> Создать доску
                    </div>
                </div>
            </div>
            <div class="header-actions">
                <button id="calendarBtn" class="calendar-btn" title="Календарь">
                    <i class="fas fa-calendar-alt"></i>
                    <span class="label">Календарь</span>
                    <span class="badge-calendar" id="calendarBadge">0</span>
                </button>
                <button id="archiveToggleBtn" title="Архив">
                    <i class="fas fa-archive"></i>
                    <span class="label">Архив</span>
                    <span class="badge-archive" id="archiveBadge">0</span>
                </button>
                <div class="export-dropdown">
                    <button id="exportBtn" title="Экспорт">
                        <i class="fas fa-file-export"></i>
                        <span class="label">Экспорт</span>
                        <i class="fas fa-chevron-down" style="font-size:10px;margin-left:2px;"></i>
                    </button>
                    <div class="dropdown-menu" id="exportDropdown">
                        <button data-format="json"><i class="fas fa-code"></i> JSON</button>
                        <button data-format="csv"><i class="fas fa-table"></i> CSV</button>
                        <button data-format="markdown"><i class="fas fa-file-alt"></i> Markdown</button>
                    </div>
                </div>
                <button id="importBtn" title="Импорт">
                    <i class="fas fa-file-import"></i>
                    <span class="label">Импорт</span>
                </button>
            </div>
        </header>

        <div class="board-wrapper" id="boardWrapper">
            <div class="board" id="board"></div>
        </div>

        <button class="fab" id="fabBtn" title="Добавить задачу">
            <i class="fas fa-plus"></i>
        </button>

        <button class="sidebar-toggle" id="sidebarToggle" title="Меню"></button>
        <div class="sidebar" id="sidebar">
            <div class="sidebar-label">Фон</div>
            <div class="sidebar-row">
                <div class="bg-colors" id="bgColors">
                    <div class="color-option active" data-bg="blue" title="Синий"></div>
                    <div class="color-option" data-bg="dark" title="Черный"></div>
                </div>
            </div>
            <div class="sidebar-dots">
                <span></span><span></span><span></span>
            </div>
        </div>

        <div class="footer">
            <div class="links">
                <a href="https://github.com/idenbraun" target="_blank" rel="noopener">GitHub</a>
                <a href="https://t.me/idendie" target="_blank" rel="noopener">t.me/idendie</a>
                <a href="mailto:idenbraun@yandex.ru">idenbraun@yandex.ru</a>
            </div>
        </div>

        <!-- ========== МОДАЛКИ ========== -->
        <div class="modal-overlay" id="cardModal">
            <div class="modal">
                <h3 id="modalTitle"><i class="fas fa-plus-circle"></i> Новая карточка</h3>
                <label>Заголовок</label>
                <input type="text" id="cardTitleInput" placeholder="Название задачи" />
                <label>Описание</label>
                <textarea id="cardDescInput" placeholder="Подробности..."></textarea>
                <label>Тег</label>
                <select id="cardTagInput">
                    <option value="">Без тега</option>
                    <option value="red">🔴 Важно</option>
                    <option value="green">🟢 Работа</option>
                    <option value="blue">🔵 Личное</option>
                    <option value="orange">🟠 Идея</option>
                    <option value="purple">🟣 Проект</option>
                </select>
                <label>Дедлайн</label>
                <input type="datetime-local" id="cardDeadlineInput" />
                <div class="modal-actions">
                    <button class="btn-secondary" id="modalCancelBtn"><i class="fas fa-times"></i> Отмена</button>
                    <button class="btn-primary" id="modalSaveBtn"><i class="fas fa-save"></i> Сохранить</button>
                </div>
            </div>
        </div>

        <div class="modal-overlay" id="boardModal">
            <div class="modal">
                <h3><i class="fas fa-plus-circle"></i> Новая доска</h3>
                <label>Название доски</label>
                <input type="text" id="boardNameInput" placeholder="Например: Работа, Личное..." />
                <div class="modal-actions">
                    <button class="btn-secondary" id="boardModalCancelBtn"><i class="fas fa-times"></i> Отмена</button>
                    <button class="btn-primary" id="boardModalSaveBtn"><i class="fas fa-save"></i> Создать</button>
                </div>
            </div>
        </div>

        <div class="modal-overlay" id="calendarModal">
            <div class="modal calendar-modal">
                <div class="calendar-header">
                    <h3><i class="fas fa-calendar-alt"></i> <span id="calendarTitle">Календарь</span></h3>
                    <div class="calendar-nav">
                        <button id="calendarPrev"><i class="fas fa-chevron-left"></i></button>
                        <button id="calendarNext"><i class="fas fa-chevron-right"></i></button>
                    </div>
                </div>
                <div class="calendar-grid" id="calendarGrid"></div>
                <div class="calendar-events" id="calendarEvents">
                    <h4>Задачи на выбранную дату</h4>
                    <div id="calendarEventsList"></div>
                </div>
                <div class="modal-actions">
                    <button class="btn-secondary" id="calendarCloseBtn"><i class="fas fa-times"></i> Закрыть</button>
                </div>
            </div>
        </div>

        <input type="file" id="fileInput" accept=".json">
    </div>

    <script>
        (function() {
            'use strict';

            // ================================================================
            // 1. КОНФИГУРАЦИЯ
            // ================================================================
            const STORAGE_KEY = 'kanban_data';
            const SHOW_ARCHIVE_KEY = 'kanban_show_archive';
            const ARCHIVE_DAYS = 3;
            const NOTIFICATION_DURATION = 5000;

            const COLUMNS = [
                { id: 'todo', title: 'В очереди', icon: 'fa-clipboard-list', color: 'var(--col-todo)' },
                { id: 'progress', title: 'В процессе', icon: 'fa-rocket', color: 'var(--col-progress)' },
                { id: 'done', title: 'Готово', icon: 'fa-check-circle', color: 'var(--col-done)' }
            ];

            const COLUMN_ORDER = ['todo', 'progress', 'done'];

            let data = {
                boards: {},
                currentBoardId: null
            };

            let showArchive = false;
            let editingCardId = null;
            let targetColumnId = null;
            let saveTimeout = null;
            let editingBoardId = null;
            let calendarCurrentDate = new Date();
            let calendarSelectedDate = null;

            // ================================================================
            // 2. УВЕДОМЛЕНИЯ
            // ================================================================
            function showNotification(title, text, type = 'info', duration = NOTIFICATION_DURATION) {
                const container = document.getElementById('notificationContainer');
                const icons = {
                    success: '✅',
                    warning: '⚠️',
                    danger: '❌',
                    info: 'ℹ️'
                };

                const notification = document.createElement('div');
                notification.className = `notification ${type}`;
                notification.innerHTML = `
                    <div class="notification-icon">${icons[type] || 'ℹ️'}</div>
                    <div class="notification-content">
                        <div class="notification-title">${title}</div>
                        <div class="notification-text">${text}</div>
                        <div class="notification-time">${new Date().toLocaleTimeString()}</div>
                    </div>
                `;

                notification.addEventListener('click', function() {
                    this.classList.add('hiding');
                    setTimeout(() => this.remove(), 300);
                });

                container.appendChild(notification);

                setTimeout(() => {
                    if (notification.parentNode) {
                        notification.classList.add('hiding');
                        setTimeout(() => notification.remove(), 300);
                    }
                }, duration);

                return notification;
            }

            // ================================================================
            // 3. LOCALSTORAGE
            // ================================================================
            function loadFromStorage() {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (raw) {
                    try {
                        const parsed = JSON.parse(raw);
                        if (parsed.boards && parsed.currentBoardId) {
                            data = parsed;
                            if (!data.boards[data.currentBoardId]) {
                                const boardIds = Object.keys(data.boards);
                                data.currentBoardId = boardIds.length > 0 ? boardIds[0] : null;
                            }
                            return;
                        }
                    } catch (_) {}
                }
                const boardId = generateId();
                data = {
                    boards: {
                        [boardId]: {
                            name: 'Моя доска',
                            cards: getDefaultCards()
                        }
                    },
                    currentBoardId: boardId
                };
                saveToStorage();
            }

            function saveToStorage() {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
                updateSaveStatus(true);
                updateArchiveBadge();
                updateBoardSelector();
                updateCalendarBadge();
            }

            function saveToStorageDebounced() {
                if (saveTimeout) clearTimeout(saveTimeout);
                updateSaveStatus(false);
                saveTimeout = setTimeout(function() {
                    saveToStorage();
                    saveTimeout = null;
                }, 400);
            }

            function updateSaveStatus(saved) {
                const status = document.getElementById('saveStatus');
                if (saved) {
                    status.className = 'save-status saved';
                    status.querySelector('.status-icon').className = 'fas fa-check-circle status-icon';
                    status.querySelector('.status-text').textContent = 'Сохранено';
                } else {
                    status.className = 'save-status saving';
                    status.querySelector('.status-icon').className = 'fas fa-spinner fa-spin status-icon';
                    status.querySelector('.status-text').textContent = 'Сохранение...';
                }
            }

            // ================================================================
            // 4. РАБОТА С ДОСКАМИ
            // ================================================================
            function getCurrentBoard() {
                if (!data.currentBoardId || !data.boards[data.currentBoardId]) {
                    const ids = Object.keys(data.boards);
                    if (ids.length === 0) {
                        const id = generateId();
                        data.boards[id] = { name: 'Моя доска', cards: [] };
                        data.currentBoardId = id;
                        saveToStorage();
                    } else {
                        data.currentBoardId = ids[0];
                        saveToStorage();
                    }
                }
                return data.boards[data.currentBoardId];
            }

            function getCards() {
                return getCurrentBoard().cards || [];
            }

            function setCards(newCards) {
                getCurrentBoard().cards = newCards;
            }

            function getBoardName() {
                return getCurrentBoard().name || 'Канбан';
            }

            function getActiveCards() {
                return getCards().filter(c => c.column !== 'archive');
            }

            function getArchivedCards() {
                return getCards().filter(c => c.column === 'archive');
            }

            function getCardsWithDeadline() {
                return getCards().filter(c => c.deadline);
            }

            function updateArchiveBadge() {
                const count = getArchivedCards().length;
                const badge = document.getElementById('archiveBadge');
                if (badge) badge.textContent = count;
            }

            function updateCalendarBadge() {
                const count = getCardsWithDeadline().filter(c => c.column !== 'archive' && c.column !== 'done').length;
                const badge = document.getElementById('calendarBadge');
                if (badge) badge.textContent = count;
            }

            function getNextColumn(columnId) {
                const index = COLUMN_ORDER.indexOf(columnId);
                if (index === -1 || index === COLUMN_ORDER.length - 1) return null;
                return COLUMN_ORDER[index + 1];
            }

            function moveCardToNextColumn(cardId) {
                const cards = getCards();
                const card = cards.find(c => c.id === cardId);
                if (!card) return false;

                const nextColumn = getNextColumn(card.column);
                if (!nextColumn) {
                    showNotification('Информация', 'Карточка уже в последней колонке', 'info');
                    return false;
                }

                card.column = nextColumn;
                if (nextColumn === 'done') {
                    card.completedAt = Date.now();
                }
                setCards(cards);
                saveToStorageDebounced();
                render();
                showNotification('Перемещено', `"${card.title}" → ${COLUMNS.find(c => c.id === nextColumn).title}`, 'success');
                return true;
            }

            // ================================================================
            // 5. ВЫПАДАЮЩИЙ СПИСОК ДОСОК
            // ================================================================
            function updateBoardSelector() {
                const nameEl = document.getElementById('boardName');
                nameEl.textContent = getBoardName();

                const list = document.getElementById('boardList');
                list.innerHTML = '';

                Object.keys(data.boards).forEach(id => {
                    const board = data.boards[id];
                    const item = document.createElement('div');
                    item.className = 'board-item' + (id === data.currentBoardId ? ' active' : '');

                    const nameSpan = document.createElement('span');
                    nameSpan.className = 'board-name';
                    nameSpan.textContent = board.name;
                    nameSpan.dataset.boardId = id;

                    nameSpan.addEventListener('dblclick', function(e) {
                        e.stopPropagation();
                        startRenameBoard(id, this);
                    });

                    const deleteBtn = document.createElement('span');
                    deleteBtn.className = 'delete-board';
                    deleteBtn.innerHTML = '<i class="fas fa-times"></i>';
                    deleteBtn.title = 'Удалить доску';
                    if (Object.keys(data.boards).length <= 1) {
                        deleteBtn.style.opacity = '0.3';
                        deleteBtn.style.cursor = 'default';
                    } else {
                        deleteBtn.addEventListener('click', function(e) {
                            e.stopPropagation();
                            deleteBoard(id);
                        });
                    }

                    item.appendChild(nameSpan);
                    item.appendChild(deleteBtn);

                    item.addEventListener('click', function(e) {
                        if (e.target.closest('.delete-board') || e.target.closest('.board-name.editing')) return;
                        switchBoard(id);
                    });

                    list.appendChild(item);
                });
            }

            // ================================================================
            // 6. ПЕРЕИМЕНОВАНИЕ ДОСКИ
            // ================================================================
            function startRenameBoard(boardId, element) {
                if (editingBoardId) return;
                editingBoardId = boardId;

                const currentName = data.boards[boardId].name;
                const input = document.createElement('input');
                input.type = 'text';
                input.className = 'board-name editing';
                input.value = currentName;
                input.dataset.boardId = boardId;

                element.replaceWith(input);
                input.focus();
                input.select();

                function finishRename() {
                    const newName = input.value.trim() || 'Доска';
                    data.boards[boardId].name = newName;
                    editingBoardId = null;
                    saveToStorage();
                    updateBoardSelector();
                    const nameEl = document.getElementById('boardName');
                    nameEl.textContent = newName;
                }

                input.addEventListener('blur', finishRename);
                input.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter') {
                        input.blur();
                    }
                    if (e.key === 'Escape') {
                        input.value = currentName;
                        input.blur();
                    }
                });
            }

            // ================================================================
            // 7. ПЕРЕКЛЮЧЕНИЕ / УДАЛЕНИЕ ДОСОК
            // ================================================================
            function switchBoard(boardId) {
                if (boardId === data.currentBoardId) return;
                if (!data.boards[boardId]) return;
                data.currentBoardId = boardId;
                showArchive = false;
                localStorage.setItem(SHOW_ARCHIVE_KEY, 'false');
                document.getElementById('archiveToggleBtn').style.color = '';
                saveToStorage();
                closeBoardDropdown();
                render();
                showNotification('Переключено', `Доска: ${data.boards[boardId].name}`, 'info');
            }

            function deleteBoard(boardId) {
                if (Object.keys(data.boards).length <= 1) {
                    showNotification('Ошибка', 'Нельзя удалить единственную доску', 'danger');
                    return;
                }
                if (!confirm('Удалить доску "' + data.boards[boardId].name + '" со всеми карточками?')) return;

                delete data.boards[boardId];
                if (data.currentBoardId === boardId) {
                    const ids = Object.keys(data.boards);
                    data.currentBoardId = ids[0];
                }
                saveToStorage();
                closeBoardDropdown();
                render();
                showNotification('Удалено', 'Доска удалена', 'danger');
            }

            function createNewBoard(name) {
                const id = generateId();
                data.boards[id] = {
                    name: name || 'Новая доска',
                    cards: []
                };
                data.currentBoardId = id;
                saveToStorage();
                closeBoardDropdown();
                render();
                showNotification('Создано', `Доска "${name}" создана`, 'success');
            }

            function openBoardModal() {
                const modal = document.getElementById('boardModal');
                modal.classList.add('active');
                document.getElementById('boardNameInput').value = '';
                setTimeout(() => document.getElementById('boardNameInput').focus(), 300);
            }

            function closeBoardModal() {
                document.getElementById('boardModal').classList.remove('active');
            }

            function saveBoardFromModal() {
                const name = document.getElementById('boardNameInput').value.trim() || 'Новая доска';
                createNewBoard(name);
                closeBoardModal();
            }

            // ================================================================
            // 8. ВЫПАДАЮЩИЙ СПИСОК (открытие/закрытие)
            // ================================================================
            let isBoardDropdownOpen = false;

            function toggleBoardDropdown() {
                if (editingBoardId) return;
                isBoardDropdownOpen = !isBoardDropdownOpen;
                document.getElementById('boardDropdown').classList.toggle('open', isBoardDropdownOpen);
                document.getElementById('boardArrow').classList.toggle('open', isBoardDropdownOpen);
            }

            function closeBoardDropdown() {
                isBoardDropdownOpen = false;
                document.getElementById('boardDropdown').classList.remove('open');
                document.getElementById('boardArrow').classList.remove('open');
            }

            // ================================================================
            // 9. ДАННЫЕ (дефолтные карточки)
            // ================================================================
            function getDefaultCards() {
                const now = new Date();
                const tomorrow = new Date(now);
                tomorrow.setDate(tomorrow.getDate() + 1);
                const nextWeek = new Date(now);
                nextWeek.setDate(nextWeek.getDate() + 7);

                return [{
                    id: generateId(),
                    title: 'Сделать дизайн',
                    desc: 'Фигма, 10 экранов',
                    tag: 'blue',
                    column: 'todo',
                    deadline: tomorrow.toISOString()
                }, {
                    id: generateId(),
                    title: 'Написать код',
                    desc: 'React + Node.js',
                    tag: 'orange',
                    column: 'progress',
                    deadline: nextWeek.toISOString()
                }, {
                    id: generateId(),
                    title: 'Задеплоить',
                    desc: 'На VPS с nginx',
                    tag: 'green',
                    column: 'done',
                    completedAt: Date.now(),
                    deadline: now.toISOString()
                }];
            }

            function generateId() {
                return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
            }

            // ================================================================
            // 10. ПРОВЕРКА ДЕДЛАЙНОВ (уведомления)
            // ================================================================
            let deadlineChecked = false;

            function checkDeadlines() {
                const cards = getCards();
                const now = new Date();
                const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
                const tomorrow = new Date(today);
                tomorrow.setDate(tomorrow.getDate() + 1);

                let urgentCount = 0;
                let todayCount = 0;
                let tomorrowCount = 0;

                cards.forEach(card => {
                    if (!card.deadline || card.column === 'archive') return;
                    const deadline = new Date(card.deadline);

                    if (card.column !== 'done') {
                        if (deadline < now) {
                            urgentCount++;
                        } else if (deadline.toDateString() === today.toDateString()) {
                            todayCount++;
                        } else if (deadline.toDateString() === tomorrow.toDateString()) {
                            tomorrowCount++;
                        }
                    }
                });

                // Показываем уведомления только при первой проверке после загрузки
                if (!deadlineChecked) {
                    if (urgentCount > 0) {
                        showNotification('🔥 Просрочено!',
                            `${urgentCount} ${getDeclension(urgentCount, 'задача', 'задачи', 'задач')} просрочено`,
                            'danger');
                    }
                    if (todayCount > 0) {
                        showNotification('⏰ Сегодня!',
                            `${todayCount} ${getDeclension(todayCount, 'задача', 'задачи', 'задач')} на сегодня`,
                            'warning');
                    }
                    if (tomorrowCount > 0) {
                        showNotification('📅 Завтра',
                            `${tomorrowCount} ${getDeclension(tomorrowCount, 'задача', 'задачи', 'задач')} на завтра`,
                            'info');
                    }
                    deadlineChecked = true;
                }

                return { urgent: urgentCount, today: todayCount, tomorrow: tomorrowCount };
            }

            function getDeclension(n, one, few, many) {
                if (n % 10 === 1 && n % 100 !== 11) return one;
                if (n % 10 >= 2 && n % 10 <= 4 && (n % 100 < 10 || n % 100 >= 20)) return few;
                return many;
            }

            // ================================================================
            // 11. АВТОАРХИВ
            // ================================================================
            function checkArchive() {
                const now = Date.now();
                const threshold = ARCHIVE_DAYS * 24 * 60 * 60 * 1000;
                let changed = false;
                const cards = getCards();

                cards.forEach(card => {
                    if (card.column === 'done' && card.completedAt) {
                        if (!card.manuallyArchived && (now - card.completedAt > threshold)) {
                            card.column = 'archive';
                            card.archivedAt = now;
                            card.autoArchived = true;
                            changed = true;
                        }
                    }
                });

                if (changed) {
                    setCards(cards);
                    saveToStorage();
                    render();
                    const archived = cards.filter(c => c.autoArchived).length;
                    showNotification('Архивация',
                        `${archived} ${getDeclension(archived, 'задача', 'задачи', 'задач')} автоматически архивирована`,
                        'info');
                }
            }

            setInterval(checkArchive, 10000);

            // ================================================================
            // 12. РЕНДЕРИНГ
            // ================================================================
            function render() {
                const board = document.getElementById('board');
                board.innerHTML = '';
                const cards = getCards();

                const columnsToRender = [...COLUMNS];
                if (showArchive) {
                    columnsToRender.push({ id: 'archive', title: 'Архив', icon: 'fa-archive',
                        color: 'var(--col-archive)' });
                }

                columnsToRender.forEach(col => {
                    const colCards = cards.filter(c => c.column === col.id);
                    const colDiv = document.createElement('div');
                    colDiv.className = 'column';
                    colDiv.dataset.columnId = col.id;

                    const header = document.createElement('div');
                    header.className = 'column-header';
                    header.innerHTML = `
                        <h2>
                            <i class="fas ${col.icon} col-icon" style="color:${col.color};"></i>
                            ${col.title}
                            <span class="badge">${colCards.length}</span>
                        </h2>
                        ${col.id !== 'archive' ? `<button class="add-card-btn" data-column="${col.id}"><i class="fas fa-plus"></i></button>` : ''}
                    `;
                    colDiv.appendChild(header);

                    const list = document.createElement('div');
                    list.className = 'card-list';
                    list.dataset.columnId = col.id;

                    if (colCards.length === 0) {
                        const empty = document.createElement('div');
                        empty.className = 'empty-message';
                        empty.innerHTML = col.id === 'archive' ?
                            '<i class="fas fa-inbox"></i> Архив пуст' :
                            '<i class="fas fa-inbox"></i> Нет карточек';
                        list.appendChild(empty);
                    } else {
                        colCards.forEach((card, index) => {
                            const wrapper = createCardWrapper(card);
                            if (index === colCards.length - 1) {
                                wrapper.classList.add('card-enter');
                            }
                            list.appendChild(wrapper);
                        });
                    }

                    colDiv.appendChild(list);
                    board.appendChild(colDiv);
                });

                document.querySelectorAll('.add-card-btn').forEach(btn => {
                    btn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        const columnId = this.dataset.column;
                        openModal(null, columnId);
                    });
                });

                setupDragAndDrop();
                updateArchiveBadge();
                updateCalendarBadge();
                updateBoardSelector();

                const btn = document.getElementById('archiveToggleBtn');
                btn.style.color = showArchive ? 'var(--btn-primary)' : '';

                // Проверяем дедлайны после рендера
                if (!deadlineChecked) {
                    setTimeout(checkDeadlines, 500);
                }
            }

            // ================================================================
            // 13. КАРТОЧКА
            // ================================================================
            function createCardWrapper(card) {
                const wrapper = document.createElement('div');
                wrapper.className = 'card-wrapper';
                wrapper.dataset.cardId = card.id;

                const inner = document.createElement('div');
                inner.className = 'card-inner';

                const title = document.createElement('div');
                title.className = 'card-title';
                title.textContent = card.title || 'Без названия';
                inner.appendChild(title);

                if (card.desc) {
                    const desc = document.createElement('div');
                    desc.className = 'card-desc';
                    desc.textContent = card.desc;
                    inner.appendChild(desc);
                }

                if (card.tag) {
                    const tag = document.createElement('span');
                    tag.className = 'card-tag ' + card.tag;
                    const labels = { red: 'Важно', green: 'Работа', blue: 'Личное', orange: 'Идея', purple: 'Проект' };
                    tag.textContent = labels[card.tag] || card.tag;
                    inner.appendChild(tag);
                }

                // Дедлайн
                if (card.deadline) {
                    const deadline = new Date(card.deadline);
                    const now = new Date();
                    const isDone = card.column === 'done' || card.column === 'archive';
                    let className = 'card-deadline future';
                    let icon = 'fa-clock';

                    if (isDone) {
                        className = 'card-deadline done';
                        icon = 'fa-check-circle';
                    } else if (deadline < now) {
                        className = 'card-deadline urgent';
                        icon = 'fa-exclamation-circle';
                    } else if (deadline.toDateString() === now.toDateString()) {
                        className = 'card-deadline today';
                        icon = 'fa-hourglass-half';
                    }

                    const deadlineEl = document.createElement('div');
                    deadlineEl.className = className;
                    deadlineEl.innerHTML = `
                        <i class="fas ${icon}"></i>
                        ${formatDate(deadline)}
                    `;
                    inner.appendChild(deadlineEl);
                }

                if (card.column === 'archive' && card.autoArchived) {
                    const badge = document.createElement('div');
                    badge.className = 'auto-archive-badge';
                    badge.innerHTML = '<i class="fas fa-clock"></i> Автоархив';
                    inner.appendChild(badge);
                }

                const actions = document.createElement('div');
                actions.className = 'card-actions';

                const editBtn = document.createElement('button');
                editBtn.innerHTML = '<i class="fas fa-pen"></i>';
                editBtn.title = 'Редактировать';
                editBtn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    openModal(card.id);
                });
                actions.appendChild(editBtn);

                if (card.column === 'archive') {
                    const restoreBtn = document.createElement('button');
                    restoreBtn.className = 'restore-btn';
                    restoreBtn.innerHTML = '<i class="fas fa-undo"></i>';
                    restoreBtn.title = 'Восстановить';
                    restoreBtn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        if (confirm('Восстановить "' + card.title + '" в "Готово"?')) {
                            restoreFromArchive(card.id);
                        }
                    });
                    actions.appendChild(restoreBtn);

                    const deleteBtn = document.createElement('button');
                    deleteBtn.innerHTML = '<i class="fas fa-times"></i>';
                    deleteBtn.title = 'Удалить навсегда';
                    deleteBtn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        if (confirm('Навсегда удалить "' + card.title + '"?')) {
                            deleteCard(card.id);
                        }
                    });
                    actions.appendChild(deleteBtn);
                } else {
                    const deleteBtn = document.createElement('button');
                    deleteBtn.innerHTML = '<i class="fas fa-times"></i>';
                    deleteBtn.title = 'Удалить';
                    deleteBtn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        if (confirm('Удалить "' + card.title + '"?')) {
                            deleteCard(card.id);
                        }
                    });

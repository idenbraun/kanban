                    actions.appendChild(deleteBtn);
                }

                inner.appendChild(actions);
                wrapper.appendChild(inner);

                // ========== СВАЙП-ЖЕСТЫ ==========
                let touchStartX = 0;
                let touchStartY = 0;
                let isSwiping = false;
                let swipeTimeout = null;

                wrapper.addEventListener('touchstart', function(e) {
                    if (card.column === 'archive') return;
                    if (e.touches.length !== 1) return;

                    const touch = e.touches[0];
                    touchStartX = touch.clientX;
                    touchStartY = touch.clientY;
                    isSwiping = false;
                }, { passive: true });

                wrapper.addEventListener('touchmove', function(e) {
                    if (card.column === 'archive') return;
                    if (e.touches.length !== 1) return;

                    const touch = e.touches[0];
                    const dx = touch.clientX - touchStartX;
                    const dy = touch.clientY - touchStartY;

                    if (Math.abs(dx) > 30 && Math.abs(dx) > Math.abs(dy) * 1.5) {
                        isSwiping = true;
                        e.preventDefault();

                        // Визуальный фидбек
                        const translateX = Math.min(Math.max(dx, -100), 100);
                        wrapper.style.transform = `translateX(${translateX}px)`;
                        wrapper.style.opacity = 1 - Math.abs(translateX) / 200;

                        if (swipeTimeout) {
                            clearTimeout(swipeTimeout);
                            swipeTimeout = null;
                        }
                    }
                }, { passive: false });

                wrapper.addEventListener('touchend', function(e) {
                    if (card.column === 'archive') return;
                    if (!isSwiping) return;

                    const touch = e.changedTouches[0];
                    const dx = touch.clientX - touchStartX;

                    wrapper.style.transform = '';
                    wrapper.style.opacity = '';

                    if (dx > 60) {
                        // Свайп вправо - в следующую колонку
                        wrapper.classList.add('swipe-right');
                        swipeTimeout = setTimeout(() => {
                            wrapper.classList.remove('swipe-right');
                            moveCardToNextColumn(card.id);
                        }, 300);
                    } else {
                        // Сброс
                        wrapper.classList.add('card-enter');
                        setTimeout(() => wrapper.classList.remove('card-enter'), 300);
                    }

                    isSwiping = false;
                    touchStartX = 0;
                    touchStartY = 0;
                }, { passive: true });

                // ========== ДВОЙНОЙ ТАП ==========
                let lastTapTime = 0;
                wrapper.addEventListener('touchend', function(e) {
                    if (card.column === 'archive') return;
                    if (isSwiping) return;

                    const now = Date.now();
                    const timeSinceLastTap = now - lastTapTime;

                    if (timeSinceLastTap < 300 && timeSinceLastTap > 0) {
                        // Двойной тап
                        e.preventDefault();
                        openModal(card.id);
                        showNotification('Редактирование', `"${card.title}"`, 'info');
                        lastTapTime = 0;
                    } else {
                        lastTapTime = now;
                    }
                }, { passive: true });

                // ----- DESKTOP DRAG -----
                wrapper.draggable = true;

                wrapper.addEventListener('dragstart', function(e) {
                    if (card.column === 'archive') {
                        e.preventDefault();
                        return;
                    }
                    this.classList.add('dragging');
                    e.dataTransfer.effectAllowed = 'move';
                    e.dataTransfer.setData('text/plain', card.id);

                    const ghost = document.createElement('div');
                    ghost.className = 'drag-ghost';
                    document.body.appendChild(ghost);
                    e.dataTransfer.setDragImage(ghost, 0, 0);
                    setTimeout(() => {
                        if (ghost.parentNode) ghost.parentNode.removeChild(ghost);
                    }, 0);
                });

                wrapper.addEventListener('dragend', function(e) {
                    this.classList.remove('dragging');
                    document.querySelectorAll('.card-list').forEach(el => el.classList.remove('drag-over'));
                });

                wrapper.addEventListener('dblclick', function() {
                    if (card.column !== 'archive') {
                        openModal(card.id);
                        showNotification('Редактирование', `"${card.title}"`, 'info');
                    }
                });

                return wrapper;
            }

            // ================================================================
            // 14. DRAG & DROP (десктоп)
            // ================================================================
            function setupDragAndDrop() {
                document.querySelectorAll('.card-list').forEach(list => {
                    list.addEventListener('dragover', function(e) {
                        e.preventDefault();
                        e.dataTransfer.dropEffect = 'move';
                        document.querySelectorAll('.card-list').forEach(el => el.classList.remove('drag-over'));
                        this.classList.add('drag-over');

                        const afterElement = getDragAfterElement(this, e.clientY);
                        const draggable = document.querySelector('.card-wrapper.dragging');
                        if (draggable) {
                            if (afterElement) {
                                this.insertBefore(draggable, afterElement);
                            } else {
                                this.appendChild(draggable);
                            }
                        }
                    });

                    list.addEventListener('drop', function(e) {
                        e.preventDefault();
                        this.classList.remove('drag-over');

                        const cardId = e.dataTransfer.getData('text/plain');
                        if (!cardId) return;

                        const newColumnId = this.dataset.columnId;
                        const cards = getCards();
                        const card = cards.find(c => c.id === cardId);
                        if (!card) return;

                        if (card.column === newColumnId) {
                            const newOrder = [];
                            this.querySelectorAll('.card-wrapper').forEach(w => {
                                const id = w.dataset.cardId;
                                if (id) newOrder.push(id);
                            });

                            const newCards = [];
                            const cardMap = {};
                            cards.forEach(c => cardMap[c.id] = c);

                            newOrder.forEach(id => {
                                if (cardMap[id]) {
                                    newCards.push(cardMap[id]);
                                    delete cardMap[id];
                                }
                            });

                            Object.values(cardMap).forEach(c => newCards.push(c));

                            setCards(newCards);
                            saveToStorageDebounced();
                            render();
                            return;
                        }

                        if (newColumnId === 'archive') {
                            card.column = 'archive';
                            card.archivedAt = Date.now();
                            card.manuallyArchived = true;
                            delete card.autoArchived;
                            setCards(cards);
                            saveToStorageDebounced();
                            render();
                            showNotification('Архивировано', `"${card.title}"`, 'info');
                            return;
                        }

                        if (newColumnId === 'done' && card.column !== 'done') {
                            card.completedAt = Date.now();
                            delete card.manuallyArchived;
                            delete card.autoArchived;
                        }

                        card.column = newColumnId;

                        const newOrder = [];
                        this.querySelectorAll('.card-wrapper').forEach(w => {
                            const id = w.dataset.cardId;
                            if (id) newOrder.push(id);
                        });

                        const newCards = [];
                        const cardMap = {};
                        cards.forEach(c => cardMap[c.id] = c);

                        newOrder.forEach(id => {
                            if (cardMap[id]) {
                                newCards.push(cardMap[id]);
                                delete cardMap[id];
                            }
                        });

                        Object.values(cardMap).forEach(c => newCards.push(c));

                        setCards(newCards);
                        saveToStorageDebounced();
                        render();
                        showNotification('Перемещено', `"${card.title}" → ${COLUMNS.find(c => c.id === newColumnId).title}`,
                            'success');
                    });
                });
            }

            function getDragAfterElement(container, y) {
                const elements = [...container.querySelectorAll('.card-wrapper:not(.dragging)')];
                return elements.reduce((closest, child) => {
                    const box = child.getBoundingClientRect();
                    const offset = y - box.top - box.height / 2;
                    if (offset < 0 && offset > closest.offset) {
                        return { offset: offset, element: child };
                    }
                    return closest;
                }, { offset: Number.NEGATIVE_INFINITY }).element;
            }

            // ================================================================
            // 15. ДЕЙСТВИЯ
            // ================================================================
            function deleteCard(cardId) {
                const cards = getCards();
                const card = cards.find(c => c.id === cardId);
                if (!card) return;
                const title = card.title;
                let cardsNew = cards.filter(c => c.id !== cardId);
                setCards(cardsNew);
                saveToStorageDebounced();
                render();
                showNotification('Удалено', `"${title}"`, 'danger');
            }

            function restoreFromArchive(cardId) {
                const cards = getCards();
                const card = cards.find(c => c.id === cardId);
                if (!card) return;
                card.column = 'done';
                card.completedAt = Date.now();
                delete card.manuallyArchived;
                delete card.autoArchived;
                setCards(cards);
                saveToStorageDebounced();
                render();
                showNotification('Восстановлено', `"${card.title}"`, 'success');
            }

            // ================================================================
            // 16. МОДАЛКА КАРТОЧКИ
            // ================================================================
            function openModal(cardId, columnId) {
                const overlay = document.getElementById('cardModal');
                const titleInput = document.getElementById('cardTitleInput');
                const descInput = document.getElementById('cardDescInput');
                const tagInput = document.getElementById('cardTagInput');
                const deadlineInput = document.getElementById('cardDeadlineInput');
                const modalTitle = document.getElementById('modalTitle');
                const cards = getCards();

                if (cardId) {
                    const card = cards.find(c => c.id === cardId);
                    if (!card) return;
                    editingCardId = cardId;
                    targetColumnId = null;
                    modalTitle.innerHTML = '<i class="fas fa-edit"></i> Редактировать';
                    titleInput.value = card.title || '';
                    descInput.value = card.desc || '';
                    tagInput.value = card.tag || '';
                    deadlineInput.value = card.deadline || '';
                } else {
                    editingCardId = null;
                    targetColumnId = columnId || 'todo';
                    modalTitle.innerHTML = '<i class="fas fa-plus-circle"></i> Новая карточка';
                    titleInput.value = '';
                    descInput.value = '';
                    tagInput.value = '';
                    deadlineInput.value = '';
                }

                overlay.classList.add('active');
                setTimeout(() => titleInput.focus(), 300);
            }

            function closeModal() {
                document.getElementById('cardModal').classList.remove('active');
                editingCardId = null;
                targetColumnId = null;
            }

            function saveCardFromModal() {
                const title = document.getElementById('cardTitleInput').value.trim() || 'Без названия';
                const desc = document.getElementById('cardDescInput').value.trim();
                const tag = document.getElementById('cardTagInput').value || '';
                const deadline = document.getElementById('cardDeadlineInput').value || null;
                let cards = getCards();

                if (editingCardId) {
                    const card = cards.find(c => c.id === editingCardId);
                    if (card) {
                        card.title = title;
                        card.desc = desc;
                        card.tag = tag;
                        card.deadline = deadline;
                    }
                    showNotification('Обновлено', `"${title}"`, 'success');
                } else {
                    const newCard = {
                        id: generateId(),
                        title: title,
                        desc: desc,
                        tag: tag,
                        column: targetColumnId || 'todo',
                        deadline: deadline,
                        completedAt: targetColumnId === 'done' ? Date.now() : null
                    };
                    cards.push(newCard);
                    showNotification('Создано', `"${title}"`, 'success');
                }

                setCards(cards);
                closeModal();
                saveToStorageDebounced();
                render();
            }

            // ================================================================
            // 18. КАЛЕНДАРЬ
            // ================================================================
            function formatDate(date) {
                return date.toLocaleDateString('ru-RU', {
                    day: '2-digit',
                    month: '2-digit',
                    year: 'numeric'
                });
            }

            function formatTime(date) {
                return date.toLocaleTimeString('ru-RU', {
                    hour: '2-digit',
                    minute: '2-digit'
                });
            }

            function openCalendar() {
                const modal = document.getElementById('calendarModal');
                modal.classList.add('active');
                renderCalendar();
            }

            function closeCalendar() {
                document.getElementById('calendarModal').classList.remove('active');
            }

            function renderCalendar() {
                const year = calendarCurrentDate.getFullYear();
                const month = calendarCurrentDate.getMonth();

                document.getElementById('calendarTitle').textContent =
                    new Date(year, month).toLocaleDateString('ru-RU', {
                        month: 'long',
                        year: 'numeric'
                    });

                const grid = document.getElementById('calendarGrid');
                grid.innerHTML = '';

                const weekdays = ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Вс'];
                weekdays.forEach(day => {
                    const el = document.createElement('div');
                    el.className = 'calendar-weekday';
                    el.textContent = day;
                    grid.appendChild(el);
                });

                const firstDay = new Date(year, month, 1);
                const lastDay = new Date(year, month + 1, 0);
                const daysInMonth = lastDay.getDate();
                const startOffset = (firstDay.getDay() + 6) % 7;

                const today = new Date();
                const todayStr = today.toDateString();

                // Предыдущий месяц
                const prevMonthLastDay = new Date(year, month, 0).getDate();
                for (let i = startOffset - 1; i >= 0; i--) {
                    const day = prevMonthLastDay - i;
                    const date = new Date(year, month - 1, day);
                    const el = createCalendarDay(date, true);
                    grid.appendChild(el);
                }

                // Текущий месяц
                for (let day = 1; day <= daysInMonth; day++) {
                    const date = new Date(year, month, day);
                    const el = createCalendarDay(date, false);
                    if (date.toDateString() === todayStr) {
                        el.classList.add('today');
                    }
                    if (calendarSelectedDate && date.toDateString() === calendarSelectedDate.toDateString()) {
                        el.classList.add('selected');
                    }
                    grid.appendChild(el);
                }

                // Следующий месяц
                const totalDays = startOffset + daysInMonth;
                const remainingDays = 42 - totalDays;
                for (let day = 1; day <= remainingDays; day++) {
                    const date = new Date(year, month + 1, day);
                    const el = createCalendarDay(date, true);
                    grid.appendChild(el);
                }

                renderCalendarEvents();
            }

            function createCalendarDay(date, isOtherMonth) {
                const el = document.createElement('div');
                el.className = 'calendar-day';
                if (isOtherMonth) el.classList.add('other-month');

                const dayOfWeek = date.getDay();
                if (dayOfWeek === 0 || dayOfWeek === 6) {
                    el.classList.add('weekend');
                }

                const dayNumber = document.createElement('span');
                dayNumber.className = 'day-number';
                dayNumber.textContent = date.getDate();
                el.appendChild(dayNumber);

                // Проверяем наличие дедлайнов
                const cards = getCardsWithDeadline();
                const hasDeadline = cards.some(c => {
                    if (!c.deadline) return false;
                    const d = new Date(c.deadline);
                    return d.toDateString() === date.toDateString() && c.column !== 'archive';
                });

                if (hasDeadline) {
                    const dot = document.createElement('span');
                    dot.className = 'day-dot';

                    const now = new Date();
                    const hasUrgent = cards.some(c => {
                        if (!c.deadline) return false;
                        const d = new Date(c.deadline);
                        return d.toDateString() === date.toDateString() &&
                            d < now &&
                            c.column !== 'archive' &&
                            c.column !== 'done';
                    });

                    const hasToday = cards.some(c => {
                        if (!c.deadline) return false;
                        const d = new Date(c.deadline);
                        return d.toDateString() === date.toDateString() &&
                            d.toDateString() === now.toDateString() &&
                            c.column !== 'archive' &&
                            c.column !== 'done';
                    });

                    if (hasUrgent) dot.classList.add('urgent');
                    else if (hasToday) dot.classList.add('today');
                    else dot.classList.add('future');

                    el.appendChild(dot);
                    el.classList.add('has-deadline');
                }

                el.addEventListener('click', function() {
                    calendarSelectedDate = date;
                    renderCalendar();
                });

                return el;
            }

            function renderCalendarEvents() {
                const list = document.getElementById('calendarEventsList');
                list.innerHTML = '';

                if (!calendarSelectedDate) {
                    list.innerHTML = '<div style="color: var(--text-muted); text-align: center; padding: 20px 0; font-size: 13px;">Выберите дату в календаре</div>';
                    return;
                }

                const cards = getCards();
                const events = cards.filter(c => {
                    if (!c.deadline) return false;
                    const d = new Date(c.deadline);
                    return d.toDateString() === calendarSelectedDate.toDateString();
                });

                if (events.length === 0) {
                    list.innerHTML = '<div style="color: var(--text-muted); text-align: center; padding: 20px 0; font-size: 13px;">Нет задач на эту дату</div>';
                    return;
                }

                events.sort((a, b) => new Date(a.deadline) - new Date(b.deadline));

                events.forEach(card => {
                    const el = document.createElement('div');
                    el.className = 'calendar-event';

                    const deadlineDate = new Date(card.deadline);
                    const now = new Date();
                    let status = 'future';
                    if (card.column === 'done' || card.column === 'archive') status = 'done';
                    else if (deadlineDate < now) status = 'urgent';
                    else if (deadlineDate.toDateString() === now.toDateString()) status = 'today';

                    const dot = document.createElement('span');
                    dot.className = 'event-dot ' + status;
                    el.appendChild(dot);

                    const info = document.createElement('div');
                    info.className = 'event-info';

                    const title = document.createElement('div');
                    title.className = 'event-title';
                    title.textContent = card.title;
                    info.appendChild(title);

                    const meta = document.createElement('div');
                    meta.className = 'event-meta';
                    const time = formatTime(deadlineDate);
                    const columnLabel = COLUMNS.find(c => c.id === card.column);
                    const columnName = columnLabel ? columnLabel.title : card.column;
                    meta.textContent = `${time} • ${columnName}`;
                    info.appendChild(meta);

                    el.appendChild(info);

                    const statusLabel = document.createElement('span');
                    statusLabel.className = 'event-status';
                    const statusMap = {
                        urgent: '🔥 Срочно',
                        today: '⏰ Сегодня',
                        future: '📅 Запланировано',
                        done: '✅ Готово'
                    };
                    statusLabel.textContent = statusMap[status] || status;
                    el.appendChild(statusLabel);

                    el.addEventListener('click', function() {
                        closeCalendar();
                        openModal(card.id);
                    });

                    list.appendChild(el);
                });
            }

            // ================================================================
            // 19. ЭКСПОРТ
            // ================================================================
            function exportData(format = 'json') {
                const boardData = {
                    boards: data.boards,
                    currentBoardId: data.currentBoardId,
                    exportedAt: new Date().toISOString(),
                    version: '1.0'
                };

                let content, filename, mimeType;

                switch (format) {
                    case 'json':
                        content = JSON.stringify(boardData, null, 2);
                        filename = `kanban_${new Date().toISOString().slice(0,10)}.json`;
                        mimeType = 'application/json';
                        break;

                    case 'csv':
                        const cards = getCards();
                        let csv = 'Заголовок,Описание,Тег,Колонка,Дедлайн,Статус\n';
                        cards.forEach(c => {
                            const column = COLUMNS.find(col => col.id === c.column);
                            const columnName = column ? column.title : c.column;
                            const status = c.column === 'done' ? 'Выполнено' :
                                c.column === 'archive' ? 'В архиве' :
                                c.deadline && new Date(c.deadline) < new Date() ? 'Просрочено' : 'Активно';
                            const deadline = c.deadline ? new Date(c.deadline).toLocaleDateString('ru-RU') : '';
                            csv += `"${c.title || ''}","${c.desc || ''}","${c.tag || ''}","${columnName}","${deadline}","${status}"\n`;
                        });
                        content = csv;
                        filename = `kanban_${new Date().toISOString().slice(0,10)}.csv`;
                        mimeType = 'text/csv';
                        break;

                    case 'markdown':
                        let md = `# Канбан-доска\n\n`;
                        md += `**Дата экспорта:** ${new Date().toLocaleString('ru-RU')}\n\n`;
                        md += `## Статистика\n`;
                        const allCards = getCards();
                        md += `- Всего задач: ${allCards.length}\n`;
                        md += `- Активных: ${allCards.filter(c => c.column !== 'archive' && c.column !== 'done').length}\n`;
                        md += `- Выполнено: ${allCards.filter(c => c.column === 'done').length}\n`;
                        md += `- В архиве: ${allCards.filter(c => c.column === 'archive').length}\n\n`;

                        COLUMNS.forEach(col => {
                            const colCards = allCards.filter(c => c.column === col.id);
                            md += `## ${col.title} (${colCards.length})\n\n`;
                            if (colCards.length === 0) {
                                md += `*Нет задач*\n\n`;
                            } else {
                                colCards.forEach((c, i) => {
                                    const deadline = c.deadline ? ` *(до ${new Date(c.deadline).toLocaleDateString('ru-RU')})*` :
                                        '';
                                    const tag = c.tag ? ` [${c.tag}]` : '';
                                    md += `${i + 1}. **${c.title}**${tag}${deadline}\n`;
                                    if (c.desc) md += `   - ${c.desc}\n`;
                                });
                                md += '\n';
                            }
                        });

                        content = md;
                        filename = `kanban_${new Date().toISOString().slice(0,10)}.md`;
                        mimeType = 'text/markdown';
                        break;

                    default:
                        content = JSON.stringify(boardData, null, 2);
                        filename = `kanban_${new Date().toISOString().slice(0,10)}.json`;
                        mimeType = 'application/json';
                }

                const blob = new Blob([content], { type: mimeType + ';charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

                showNotification('Экспорт', `Данные экспортированы в ${format.toUpperCase()}`, 'success');
            }

            // ================================================================
            // 20. ИМПОРТ
            // ================================================================
            function importData(file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        const parsed = JSON.parse(e.target.result);
                        if (parsed.boards && parsed.currentBoardId) {
                            if (confirm('Импорт заменит все текущие доски. Продолжить?')) {
                                data = parsed;
                                saveToStorage();
                                render();
                                showNotification('Импорт', 'Данные успешно импортированы', 'success');
                            }
                        } else {
                            showNotification('Ошибка', 'Невалидный файл', 'danger');
                        }
                    } catch (_) {
                        showNotification('Ошибка', 'Не удалось прочитать файл', 'danger');
                    }
                };
                reader.readAsText(file);
            }

            // ================================================================
            // 21. САЙДБАР — ВЫБОР ФОНА
            // ================================================================
            const sidebar = document.getElementById('sidebar');
            const sidebarToggle = document.getElementById('sidebarToggle');

            sidebarToggle.addEventListener('click', function() {
                sidebar.classList.toggle('open');
                sidebarToggle.classList.toggle('active');
            });

            document.addEventListener('click', function(e) {
                if (!sidebar.contains(e.target) && e.target !== sidebarToggle) {
                    sidebar.classList.remove('open');
                    sidebarToggle.classList.remove('active');
                }
            });

            const bgColors = {
                blue: 'radial-gradient(ellipse at 50% 30%, #141b2d 0%, #0a0e1a 70%)',
                dark: '#0a0a0a'
            };

            function applyBgColor(colorKey) {
                const gradient = bgColors[colorKey];
                if (gradient) {
                    document.documentElement.style.cssText = 'background: ' + gradient +
                        ' !important; background-attachment: fixed !important; background-size: 100% 100% !important; background-repeat: no-repeat !important; background-position: center center !important;';
                    document.documentElement.setAttribute('data-bg', colorKey);
                    localStorage.setItem('kanban-bg', colorKey);

                    document.querySelectorAll('.color-option').forEach(el => {
                        el.classList.toggle('active', el.dataset.bg === colorKey);
                    });
                }
            }

            var savedBg = localStorage.getItem('kanban-bg') || 'blue';
            applyBgColor(savedBg);

            document.querySelectorAll('.color-option').forEach(el => {
                el.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const bg = this.dataset.bg;
                    applyBgColor(bg);
                    showNotification('Тема', `Фон изменен на ${bg === 'blue' ? 'синий' : 'черный'}`, 'info');
                });
            });

            // ================================================================
            // 22. ИНИЦИАЛИЗАЦИЯ
            // ================================================================
            function init() {
                showArchive = false;
                localStorage.setItem(SHOW_ARCHIVE_KEY, 'false');

                loadFromStorage();
                render();
                checkArchive();

                // Проверяем дедлайны с небольшой задержкой
                setTimeout(checkDeadlines, 1000);

                document.getElementById('boardSelector').addEventListener('click', function(e) {
                    e.stopPropagation();
                    toggleBoardDropdown();
                });

                document.addEventListener('click', function(e) {
                    const dropdown = document.getElementById('boardDropdown');
                    const selector = document.getElementById('boardSelector');
                    if (!dropdown.contains(e.target) && !selector.contains(e.target)) {
                        closeBoardDropdown();
                    }

                    // Закрываем экспорт-дропдаун
                    const exportDropdown = document.getElementById('exportDropdown');
                    const exportBtn = document.getElementById('exportBtn');
                    if (!exportDropdown.contains(e.target) && !exportBtn.contains(e.target)) {
                        exportDropdown.classList.remove('open');
                    }
                });

                document.getElementById('boardDropdown').addEventListener('click', function(e) {
                    e.stopPropagation();
                });

                document.getElementById('createBoardBtn').addEventListener('click', function(e) {
                    e.stopPropagation();
                    closeBoardDropdown();
                    openBoardModal();
                });

                document.getElementById('boardModalCancelBtn').addEventListener('click', closeBoardModal);
                document.getElementById('boardModalSaveBtn').addEventListener('click', saveBoardFromModal);
                document.getElementById('boardModal').addEventListener('click', function(e) {
                    if (e.target === this) closeBoardModal();
                });

                document.addEventListener('keydown', function(e) {
                    if (e.key === 'Escape') {
                        closeBoardModal();
                        closeModal();
                        closeCalendar();
                        document.getElementById('exportDropdown').classList.remove('open');
                        if (editingBoardId) {
                            editingBoardId = null;
                            updateBoardSelector();
                        }
                    }
                    if (e.key === 'Enter') {
                        if (document.getElementById('boardModal').classList.contains('active')) {
                            saveBoardFromModal();
                        }
                        if (document.getElementById('cardModal').classList.contains('active')) {
                            saveCardFromModal();
                        }
                    }
                });

                document.getElementById('archiveToggleBtn').addEventListener('click', toggleArchive);

                document.getElementById('modalCancelBtn').addEventListener('click', closeModal);
                document.getElementById('modalSaveBtn').addEventListener('click', saveCardFromModal);
                document.getElementById('cardModal').addEventListener('click', function(e) {
                    if (e.target === this) closeModal();
                });

                document.getElementById('fabBtn').addEventListener('click', function() {
                    openModal(null, 'todo');
                });

                // Экспорт
                const exportBtn = document.getElementById('exportBtn');
                const exportDropdown = document.getElementById('exportDropdown');

                exportBtn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    exportDropdown.classList.toggle('open');
                });

                exportDropdown.querySelectorAll('button').forEach(btn => {
                    btn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        const format = this.dataset.format;
                        exportDropdown.classList.remove('open');
                        exportData(format);
                    });
                });

                // Импорт
                document.getElementById('importBtn').addEventListener('click', function() {
                    document.getElementById('fileInput').click();
                });

                document.getElementById('fileInput').addEventListener('change', function(e) {
                    if (this.files && this.files[0]) {
                        importData(this.files[0]);
                    }
                    this.value = '';
                });

                // Календарь
                document.getElementById('calendarBtn').addEventListener('click', openCalendar);
                document.getElementById('calendarCloseBtn').addEventListener('click', closeCalendar);
                document.getElementById('calendarModal').addEventListener('click', function(e) {
                    if (e.target === this) closeCalendar();
                });

                document.getElementById('calendarPrev').addEventListener('click', function() {
                    calendarCurrentDate.setMonth(calendarCurrentDate.getMonth() - 1);
                    renderCalendar();
                });

                document.getElementById('calendarNext').addEventListener('click', function() {
                    calendarCurrentDate.setMonth(calendarCurrentDate.getMonth() + 1);
                    renderCalendar();
                });

                // Устанавливаем сегодняшнюю дату как выбранную по умолчанию
                calendarSelectedDate = new Date();

                // Периодическая проверка дедлайнов
                setInterval(() => {
                    checkDeadlines();
                }, 60000); // Каждую минуту
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
        })();
    </script>
</body>
</html>
